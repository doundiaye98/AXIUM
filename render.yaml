# Optionnel : déploiement via Blueprint Render (New > Blueprint).
# Sinon : Web Service > Runtime Docker > root du repo, pas de "Root Directory".
services:
  - type: web
    name: axium-web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    # Render injecte PORT automatiquement : Gunicorn écoute sur 0.0.0.0:$PORT (voir Dockerfile).
    envVars:
      - key: RENDER
        value: "true"
      - key: FLASK_SECRET_KEY
        generateValue: true
